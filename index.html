<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kōji Baseline</title>
  <link rel="stylesheet" href="/src/styles/wallace.css" />
</head>
<body>
  <div id="app">

    <!-- ── Status bar ─────────────────────────────────────────── -->
    <div class="dashboard-top">
      <span class="label-icon">◉</span>
      CPU <span class="value" id="cpu-value">--%</span>
      <span class="separator">│</span>
      MEM <span class="value" id="mem-value">--G</span>
      <span class="separator">│</span>
      <span class="llm-badge" id="llm-badge" title="Click to set up the AI agent" style="cursor:pointer">
        <span class="llm-prompt-hint">&gt;&gt;</span>
        <span class="value" id="llm-model"></span>
        <span class="llm-dot" id="llm-dot">●</span>
      </span>
      <span class="separator">│</span>
      <span class="era-clock" id="era-clock">--</span>
      <span class="idle-icon" id="idle-icon"></span>
    </div>

    <!-- ── Tab bar ────────────────────────────────────── -->
    <div class="terminal-tabbar" id="terminal-tabbar">
      <div class="tabbar-tabs" id="tabbar-tabs"></div>
      <button class="tabbar-new" id="tabbar-new" title="New tab (Cmd+T)">+</button>
    </div>

    <!-- ── Terminal canvas ────────────────────────────────────── -->
    <div class="terminal-viewport" id="terminal-container">
      <div class="terminal-overlay" id="terminal-overlay"></div>
    </div>

    <!-- ── Context bar ────────────────────────────────────────── -->
    <div class="dashboard-bottom">
      <span style="color: var(--koji-dim);">▸</span>
      <span class="path" id="cwd-path">~/</span>
      <span style="color: var(--koji-dim);">on</span>
      <span class="branch" id="git-branch">--</span>
      <span class="git-status" id="git-status"></span>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
