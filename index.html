<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kōji Baseline</title>
  <link rel="stylesheet" href="/src/styles/wallace.css" />
</head>
<body>
  <div id="app">

    <!-- ── Status bar ─────────────────────────────────────────── -->
    <div class="dashboard-top">
      <span class="label-icon">◉</span>
      CPU <span class="value" id="cpu-value">--%</span>
      <span class="separator">│</span>
      MEM <span class="value" id="mem-value">--G</span>
      <span class="separator">│</span>
      <span class="llm-badge" id="llm-badge" title="Type >> followed by your question to chat with the LLM">
        <span class="llm-prompt-hint">&gt;&gt;</span>
        <span class="value" id="model-name">--</span>
        <span class="model-ready" id="model-status">●</span>
      </span>
      <span class="separator">│</span>
      <span class="era-clock" id="era-clock">--</span>
    </div>

    <!-- ── Waveform top ───────────────────────────────────────── -->
    <div class="waveform" id="waveform-top">▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁</div>

    <!-- ── Terminal canvas ────────────────────────────────────── -->
    <div class="terminal-viewport" id="terminal-container"></div>

    <!-- ── Waveform bottom ────────────────────────────────────── -->
    <div class="waveform" id="waveform-bottom">▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁▁▂▃▄▅▆▇█▇▆▅▄▃▂▁</div>

    <!-- ── Context bar ────────────────────────────────────────── -->
    <div class="dashboard-bottom">
      <span style="color: var(--koji-dim);">▸</span>
      <span class="path" id="cwd-path">~/</span>
      <span style="color: var(--koji-dim);">on</span>
      <span class="branch" id="git-branch">--</span>
      <span class="git-status" id="git-status"></span>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
